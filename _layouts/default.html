
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="{{ site.lang | default: " en-US" }}">

  {% include head.html %}

<body>
  <header>
    <div class="navbar-fixed">
      <nav>
        <div class="container">
          <div class="nav-wrapper">
            <a href="/" class="brand-logo center">SOUZA</a>
            <ul class="right hide-on-med-and-down">
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>

    <div class="container">
      
      <div class="row">
        
        <div class="input-field col s12">
          <input id="search-input" type="text" class="validate">
          <label for="search-input">Search</label>
        </div>

      </div>

      {% include head.html %}

      <div class="row">
        <div class="input-field col s12">
          <p id="results-container"> </p>
        </div>
      </div>

      <div class="row">

        <div class="col s12">

          {{ content }}

        </div>

      </div>

    </div>

  </main>

  <!-- Search Configuration Scripts -->
  <script src="{{site.github.url}}/assets/js/simple-jekyll-search.min.js" type="text/javascript"></script>
  <script>
    window.simpleJekyllSearch = new SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('results-container'),
      json: '{{site.github.url}}/search.json',
      searchResultTemplate: '<li><a href="{url}?query={query}" title="{desc}">{title}</a></li>',
      noResultsText: 'No results found',
      limit: 10,
      fuzzy: false,
      exclude: ['Welcome']
    })
  </script>

</body>

</html>
